<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soka Global Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d1117;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            transition: background-image 0.6s ease;
        }

        /* Gradient overlay for depth and readability */
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(5, 5, 20, 0.75) 0%,
                rgba(10, 10, 35, 0.60) 50%,
                rgba(5, 5, 20, 0.80) 100%
            );
            z-index: 1;
        }

        /* Central card with premium frosted-glass effect */
        .quote-container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            width: 92%;
            padding: 0;
            background: rgba(12, 12, 28, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 20px 60px rgba(0, 0, 0, 0.65),
                0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
        }

        /* Top date bar */
        .date-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.85rem 2rem;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .date-label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #c9a96e;
        }

        /* Quote body area */
        .quote-body {
            padding: 2.6rem 3rem 1.8rem;
            text-align: center;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .quote-body.fade-out {
            opacity: 0;
            transform: translateY(6px);
        }

        /* Decorative opening quotation mark */
        .quote-mark {
            display: block;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 5rem;
            line-height: 1;
            color: #c9a96e;
            opacity: 0.35;
            margin-bottom: -0.8rem;
            user-select: none;
        }

        .quote-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.3rem;
            font-weight: 400;
            font-style: italic;
            line-height: 1.8;
            color: #f2ece3;
            margin-bottom: 1.8rem;
        }

        /* Thin separator line */
        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9a96e, transparent);
            margin: 0 auto 1.4rem;
            border: none;
        }

        .quote-author {
            font-size: 0.82rem;
            font-weight: 600;
            color: #c9a96e;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 0.4rem;
        }

        .quote-material {
            font-size: 0.75rem;
            font-style: italic;
            color: rgba(200, 190, 175, 0.55);
            line-height: 1.5;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Navigation area */
        .nav-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem 1.4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            gap: 0.75rem;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0d8ce;
            padding: 0.55rem 1.2rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.12s ease;
            user-select: none;
            min-width: 110px;
        }

        .nav-btn:hover {
            background: rgba(201, 169, 110, 0.14);
            border-color: rgba(201, 169, 110, 0.35);
            color: #c9a96e;
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        .nav-btn-label {
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.55;
            font-weight: 600;
        }

        .nav-btn-date {
            font-size: 0.82rem;
            font-weight: 400;
        }

        /* Center counter badge */
        .nav-counter {
            font-size: 0.72rem;
            color: rgba(200, 190, 175, 0.4);
            letter-spacing: 0.06em;
            text-align: center;
            flex: 1;
        }

        .error-message {
            color: #e07070;
            font-size: 0.9rem;
            padding: 2rem 3rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .quote-body {
                padding: 2rem 1.6rem 1.4rem;
            }
            .quote-text {
                font-size: 1.1rem;
            }
            .nav-btn {
                min-width: 90px;
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="quote-container">

        <div class="date-bar">
            <svg class="date-icon" aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6;vertical-align:middle;color:#c9a96e">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span class="date-label" id="date-label">—</span>
        </div>

        <div class="quote-body" id="quote-body">
            <span class="quote-mark">"</span>
            <div class="quote-text" id="quote-text">Loading…</div>
            <hr class="divider">
            <div class="quote-author" id="quote-author"></div>
            <div class="quote-material" id="quote-material"></div>
        </div>

        <div class="nav-area">
            <button class="nav-btn" id="btn-prev" aria-label="Previous day">
                <span class="nav-btn-label">← Prev</span>
                <span class="nav-btn-date" id="prev-date"></span>
            </button>
            <div class="nav-counter" id="nav-counter"></div>
            <button class="nav-btn" id="btn-next" aria-label="Next day">
                <span class="nav-btn-label">Next →</span>
                <span class="nav-btn-date" id="next-date"></span>
            </button>
        </div>

    </div>

    <script>
        let quotesData = [];
        let currentIndex = 0;

        const MONTHS = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        // Format a date_reference like "march-19" → "March 19"
        // Uses the MONTHS array to validate and capitalise the month name.
        function formatDateRef(ref) {
            if (!ref) return '';
            const parts = ref.split('-');
            if (parts.length !== 2) return ref;
            const monthName = parts[0].toLowerCase();
            const matched = MONTHS.find(function (m) {
                return m.toLowerCase() === monthName;
            });
            const month = matched || (parts[0].charAt(0).toUpperCase() + parts[0].slice(1));
            return month + ' ' + parts[1];
        }

        // Pre-load the next background image so the transition looks instant
        function preloadImage(url) {
            if (!url) return;
            const img = new Image();
            img.src = url;
        }

        // Apply background image to the body; fall back to solid colour on error
        function applyBackground(url) {
            if (!url) {
                document.body.style.backgroundImage = 'none';
                return;
            }
            const img = new Image();
            img.onload = function () {
                document.body.style.backgroundImage = "url('" + url + "')";
            };
            img.onerror = function () {
                document.body.style.backgroundImage = 'none';
            };
            img.src = url;
        }

        // Render the quote at currentIndex with a smooth fade transition
        function renderQuote() {
            const body = document.getElementById('quote-body');
            body.classList.add('fade-out');

            setTimeout(function () {
                const q = quotesData[currentIndex];
                const total = quotesData.length;

                document.getElementById('quote-text').textContent = '\u201C' + q.quote + '\u201D';
                document.getElementById('quote-author').textContent = '— ' + q.author;
                document.getElementById('quote-material').textContent = q.material || '';
                document.getElementById('date-label').textContent = formatDateRef(q.date_reference);
                document.getElementById('nav-counter').textContent =
                    (currentIndex + 1) + ' / ' + total;

                // Update navigation button date hints
                const prevIdx = (currentIndex - 1 + total) % total;
                const nextIdx = (currentIndex + 1) % total;
                document.getElementById('prev-date').textContent =
                    formatDateRef(quotesData[prevIdx].date_reference);
                document.getElementById('next-date').textContent =
                    formatDateRef(quotesData[nextIdx].date_reference);

                // Apply background image with error fallback
                applyBackground(q.image_url);

                // Pre-load neighbours
                preloadImage(quotesData[prevIdx].image_url);
                preloadImage(quotesData[nextIdx].image_url);

                body.classList.remove('fade-out');
            }, 350);
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + quotesData.length) % quotesData.length;
            renderQuote();
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % quotesData.length;
            renderQuote();
        }

        // Keyboard navigation (← / → arrow keys)
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowLeft') showPrev();
            if (e.key === 'ArrowRight') showNext();
        });

        document.getElementById('btn-prev').addEventListener('click', showPrev);
        document.getElementById('btn-next').addEventListener('click', showNext);

        // Build the date_reference string for a given Date (e.g. "march-19")
        function todayDateReference(date) {
            const months = [
                'january', 'february', 'march', 'april', 'may', 'june',
                'july', 'august', 'september', 'october', 'november', 'december'
            ];
            return months[date.getMonth()] + '-' + date.getDate();
        }

        // Fetch quotes and start on today's quote
        async function init() {
            try {
                const response = await fetch('quotes.json');
                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }
                quotesData = await response.json();

                // Find the quote whose date_reference matches today
                const ref = todayDateReference(new Date());
                const todayIndex = quotesData.findIndex(function (q) {
                    return q.date_reference === ref;
                });
                currentIndex = todayIndex !== -1 ? todayIndex : 0;
                renderQuote();
            } catch (error) {
                console.error('Data retrieval failed:', error);
                document.getElementById('quote-body').innerHTML =
                    '<span class="error-message">Unable to load quotes. Please verify the network connection and JSON syntax.</span>';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
