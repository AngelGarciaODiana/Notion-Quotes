<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quote Widget</title>
    <style>
        /* CSS: Modern, sober, and minimalist aesthetic */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Fallback pastel background in case of network image failure */
            background-color: #F4EFEB; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background-image 0.5s ease-in-out;
        }
        
        /* Overlay layer to soften the background image and maintain a pastel aesthetic */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(244, 239, 235, 0.45); /* Translucent pastel stone */
            z-index: 1;
        }

        /* Container with frosted glass effect for optimal typographic contrast */
        .quote-container {
            position: relative;
            z-index: 2;
            max-width: 85%;
            padding: 2.5rem;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: center;
            color: #2C3E50;
        }

        .quote-text {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }

        .quote-author {
            font-size: 0.95rem;
            font-weight: 600;
            color: #34495E;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.3rem;
        }

        .quote-material {
            font-size: 0.85rem;
            font-style: italic;
            color: #7F8C8D;
        }

        .error-message {
            color: #E74C3C;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="quote-container" id="quote-content">
        Loading data...
    </div>

    <script>
        // Asynchronous function to retrieve data and update the DOM and CSS
        async function fetchAndRenderQuote() {
            try {
                // Fetch the structured JSON file
                const response = await fetch('quotes.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const quotesData = await response.json();
                
                // Calculate chronological index
                const currentDate = new Date();
                const startOfYear = new Date(currentDate.getFullYear(), 0, 0);
                const timeDifference = currentDate - startOfYear;
                const millisecondsPerDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(timeDifference / millisecondsPerDay);

                // Isolate the specific object for today's date
                const targetIndex = dayOfYear % quotesData.length;
                const selectedQuote = quotesData[targetIndex];

                // Dynamically assign the extracted image URL to the CSS background property
                if (selectedQuote.image_url) {
                    document.body.style.backgroundImage = `url('${selectedQuote.image_url}')`;
                }

                // Inject the text components into the layout
                const container = document.getElementById('quote-content');
                container.innerHTML = `
                    <div class="quote-text">"${selectedQuote.quote}"</div>
                    <div class="quote-author">— ${selectedQuote.author}</div>
                    <div class="quote-material">${selectedQuote.material}</div>
                `;
            } catch (error) {
                console.error("Data retrieval failed:", error);
                document.getElementById('quote-content').innerHTML = 
                    `<span class="error-message">Unable to load the dataset. Please verify the network connection and JSON syntax.</span>`;
            }
        }

        // Initialize script upon full page load
        window.onload = fetchAndRenderQuote;
    </script>
</body>
</html>
